# Development compose file. For production use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    image: postgres:16-alpine
    container_name: blood_donation_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blood_donation_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Dhaka}
    networks:
      - blood_donation_network
    ports:
      # Bound to loopback: reachable from the host for local tooling,
      # never exposed to the network.
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blood_donation_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-cache@123}
    environment:
      # Also passed into the container so the healthcheck can authenticate
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cache@123}
      - TZ=${TZ:-Asia/Dhaka}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - blood_donation_network
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-cache@123}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blood_donation_backend
    volumes:
      - ./backend:/code
      - static_volume:/code/staticfiles
      - media_volume:/code/media
      - logs_volume:/code/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blood_donation_network
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-project.settings.development}
      - SECRET_KEY=${SECRET_KEY:-insecure-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-blood_donation_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cache@123}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      - OTP_DEBUG_EXPOSE=${OTP_DEBUG_EXPOSE:-False}
      # Optional: auto-create the initial admin account on boot
      - DJANGO_SUPERUSER_MOBILE_NUMBER=${DJANGO_SUPERUSER_MOBILE_NUMBER:-}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-}
      - TZ=${TZ:-Asia/Dhaka}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: blood_donation_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - blood_donation_network
    environment:
      # Browser API calls are same-origin through nginx; only the
      # server-side base URL needs wiring.
      - INTERNAL_API_URL=http://backend:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super-secret-nextauth-key-change-in-production}
      - TZ=${TZ:-Asia/Dhaka}
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: blood_donation_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    environment:
      - TZ=${TZ:-Asia/Dhaka}
    networks:
      - blood_donation_network
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1, not localhost: alpine resolves localhost to ::1 but nginx listens on IPv4 only
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  blood_donation_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.115.0/24
