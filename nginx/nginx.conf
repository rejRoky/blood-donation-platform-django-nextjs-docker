worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Don't advertise the nginx version
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Rate limiting: coarse edge protection; fine-grained per-user throttling
    # happens in DRF. auth zone covers login/OTP endpoints.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_status 429;

    # WebSocket upgrade handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        client_max_body_size 10M;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy same-origin always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Auth endpoints — tighter rate limit
        location ~ ^/api/(v1/)?users/(login|register|send-reset-password-otp|verify-reset-password-otp|reset-password)/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
        }

        # API Docs
        location /doc/ {
            proxy_pass http://backend;
        }

        location /redoc/ {
            proxy_pass http://backend;
        }

        # Health checks
        location /health/ {
            access_log off;
            proxy_pass http://backend;
        }

        # Static & media — served directly from the shared volumes,
        # never through gunicorn.
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias /var/www/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Next.js HMR WebSocket (development)
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Frontend - catch all
        location / {
            proxy_pass http://frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
