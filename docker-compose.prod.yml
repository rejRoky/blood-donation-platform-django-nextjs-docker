# Production overlay. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Secrets use the ${VAR:?...} form so the stack refuses to start with
# missing credentials instead of silently falling back to insecure defaults.
services:
  db:
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-Asia/Dhaka}

  redis:
    ports: []
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    ports: []
    # No source mount in production — the image is the artifact.
    volumes:
      - static_volume:/code/staticfiles
      - media_volume:/code/media
      - logs_volume:/code/logs
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - API_DOCS_ENABLED=${API_DOCS_ENABLED:-False}
      - OTP_DEBUG_EXPOSE=False
      - TZ=${TZ:-Asia/Dhaka}

  frontend:
    # No source mount in production — the image is the artifact.
    volumes: []
    ports: []
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      - INTERNAL_API_URL=http://backend:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NODE_ENV=production
      - TZ=${TZ:-Asia/Dhaka}

  nginx:
    ports:
      - "80:80"
      # Terminate TLS here (mount certificates) or in front (cloud LB/CDN).
      # - "443:443"
